name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check client
        run: npm run build --workspace=@landmind/client -- --noEmit || true
        continue-on-error: true

      - name: Type check server
        run: npm run build --workspace=@landmind/server -- --noEmit || true
        continue-on-error: true

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build --workspace=@landmind/client
        env:
          VITE_API_URL: "http://localhost:3001"
          VITE_WS_URL: "http://localhost:3001"
          VITE_SOLANA_RPC_URL: "https://api.devnet.solana.com"
          VITE_HEX_GRID_RADIUS: "20"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: packages/client/dist
          retention-days: 7

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=@landmind/server

      - name: Build server
        run: npm run build --workspace=@landmind/server

  build-contracts:
    name: Build Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked

      - name: Build contracts
        working-directory: packages/contracts
        run: anchor build --no-idl
